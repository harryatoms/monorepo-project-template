name: App Bootstrap
description: >
  Runs `make bootstrap APP=<app>` for a monorepo app.
  Assumes the repository is checked out and the runtime is already configured.

inputs:
  app:
    description: App name (directory under apps/)
    required: true

runs:
  using: composite
  steps:
    - name: Bootstrap
      shell: bash
      run: make bootstrap APP=${{ inputs.app }}
