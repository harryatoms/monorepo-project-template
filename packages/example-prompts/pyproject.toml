[project]
name = "example-prompts"
version = "0.1.0"
description = "Versioned prompt templates for optional LLM examples"
requires-python = ">=3.11"
dependencies = ["jinja2", "pyyaml"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["example_prompts"]
